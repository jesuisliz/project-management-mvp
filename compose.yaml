services:
  app:
    build:
      context: .
      target: production
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/api/health")
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s
